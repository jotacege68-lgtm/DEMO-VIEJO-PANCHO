<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>El Viejo Pancho - Pizzería</title>
    <!-- Font Awesome para iconos -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --negro-fondo: #0a0a0a;
            --negro-caja: #181818;
            --rojo: #d62828; 
            --amarillo: #fbc02d;
            --blanco: #ffffff;
            --gris-texto: #b0b0b0;
        }

        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: var(--negro-fondo);
            color: var(--blanco);
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            margin: 0;
            padding: 0;
            line-height: 1.6;
        }

        .container {
            max-width: 600px;
            margin: 0 auto;
            padding: 20px;
            padding-bottom: 220px; 
        }

        header {
            text-align: center;
            padding: 25px 0;
            border-bottom: 3px solid var(--rojo);
            margin-bottom: 20px;
            background: linear-gradient(180deg, #1a1a1a 0%, #0a0a0a 100%);
        }

        .logo-container {
            margin-bottom: 10px;
            display: flex;
            justify-content: center;
        }

        .main-logo {
            max-width: 280px;
            height: auto;
            display: block;
            border: 2px solid var(--amarillo);
            border-radius: 8px;
            box-shadow: 0 0 20px rgba(214, 40, 40, 0.4);
        }

        .btn-maps {
            background: var(--amarillo);
            color: #000;
            text-decoration: none;
            padding: 16px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            margin-bottom: 30px;
            font-weight: 800;
            text-transform: uppercase;
            box-shadow: 0 4px 15px rgba(251, 192, 45, 0.2);
            border: 1px solid rgba(0,0,0,0.1);
        }

        .categoria-titulo {
            color: var(--amarillo);
            font-size: 1.5rem;
            margin: 25px 0 15px 0;
            display: flex;
            align-items: center;
            gap: 10px;
            background: #151515;
            padding: 12px 15px;
            border-radius: 8px;
            border-left: 5px solid var(--rojo);
        }

        .producto-card {
            background: var(--negro-caja);
            border-radius: 15px;
            padding: 20px;
            margin-bottom: 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border: 1px solid #2a2a2a;
        }

        .producto-info h3 {
            margin: 0;
            font-size: 1.2rem;
            color: var(--blanco);
        }

        .producto-info span {
            color: var(--amarillo);
            font-weight: bold;
            font-size: 1.2rem;
            display: block;
            margin-top: 5px;
        }

        .controles {
            display: flex;
            align-items: center;
            gap: 12px;
            background: #000;
            padding: 8px 14px;
            border-radius: 50px;
            border: 1px solid #444;
        }

        .btn-control {
            background: var(--rojo);
            color: white;
            border: none;
            width: 38px;
            height: 38px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            font-weight: bold;
            font-size: 1.5rem;
        }

        .btn-control.minus { background: #333; }

        .cantidad-display {
            font-weight: 800;
            min-width: 35px;
            text-align: center;
            font-size: 1.4rem;
            color: var(--blanco);
        }

        /* Footer del Carrito Fijo */
        .footer-cart {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: #111;
            border-top: 4px solid var(--rojo);
            padding: 20px;
            z-index: 1000;
            box-shadow: 0 -10px 40px rgba(0,0,0,0.9);
        }

        .cart-inner {
            max-width: 600px;
            margin: 0 auto;
        }

        .input-direccion {
            width: 100%;
            background: #222;
            border: 1px solid #555;
            padding: 15px;
            border-radius: 10px;
            color: white;
            margin-bottom: 15px;
            font-size: 1.1rem;
        }

        .cart-data {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .total-monto { color: var(--amarillo); font-size: 2.4rem; font-weight: 900; }
        .total-label { color: var(--gris-texto); font-size: 0.9rem; text-transform: uppercase; display: block; }

        .btn-whatsapp {
            background: #25d366;
            color: white;
            text-decoration: none;
            padding: 16px 35px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            font-weight: bold;
            font-size: 1.2rem;
            border: none;
            cursor: pointer;
        }

        details summary { list-style: none; outline: none; cursor: pointer; }
        details summary::-webkit-details-marker { display: none; }
    </style>
</head>
<body>

    <div class="container">
        <header>
            <div class="logo-container">
                <!-- Logo desde GitHub -->
                <img src="https://raw.githubusercontent.com/jotacege68-lgtm/DEMO-VIEJO-PANCHO/refs/heads/main/1774281870711.png" alt="Pizzería El Viejo Pancho" class="main-logo">
            </div>
        </header>

        <!-- Botón de Ubicación con el Link Real -->
        <a href="https://maps.app.goo.gl/emBovVgyMAiY8orq5" target="_blank" class="btn-maps">
            <i class="fa-solid fa-location-dot"></i> CÓMO LLEGAR AL LOCAL
        </a>

        <!-- CATEGORÍA PIZZAS -->
        <details open>
            <summary class="categoria-titulo">
                <i class="fa-solid fa-pizza-slice"></i> PIZZAS
            </summary>
            
            <div class="producto-card">
                <div class="producto-info"><h3>Pizza</h3><span>$250</span></div>
                <div class="controles">
                    <button class="btn-control minus" onclick="cambiarCantidad('Pizza', 250, -1)">-</button>
                    <span class="cantidad-display" id="qty-Pizza">0</span>
                    <button class="btn-control" onclick="cambiarCantidad('Pizza', 250, 1)">+</button>
                </div>
            </div>

            <div class="producto-card">
                <div class="producto-info"><h3>Muzzarella</h3><span>$320</span></div>
                <div class="controles">
                    <button class="btn-control minus" onclick="cambiarCantidad('Muzzarella', 320, -1)">-</button>
                    <span class="cantidad-display" id="qty-Muzzarella">0</span>
                    <button class="btn-control" onclick="cambiarCantidad('Muzzarella', 320, 1)">+</button>
                </div>
            </div>

            <div class="producto-card">
                <div class="producto-info"><h3>Fainá</h3><span>$80</span></div>
                <div class="controles">
                    <button class="btn-control minus" onclick="cambiarCantidad('Faina', 80, -1)">-</button>
                    <span class="cantidad-display" id="qty-Faina">0</span>
                    <button class="btn-control" onclick="cambiarCantidad('Faina', 80, 1)">+</button>
                </div>
            </div>
        </details>

        <!-- CATEGORÍA MINUTAS -->
        <details open>
            <summary class="categoria-titulo">
                <i class="fa-solid fa-utensils"></i> MINUTAS
            </summary>
            
            <div class="producto-card">
                <div class="producto-info"><h3>Milanesas</h3><span>$380</span></div>
                <div class="controles">
                    <button class="btn-control minus" onclick="cambiarCantidad('Milanesas', 380, -1)">-</button>
                    <span class="cantidad-display" id="qty-Milanesas">0</span>
                    <button class="btn-control" onclick="cambiarCantidad('Milanesas', 380, 1)">+</button>
                </div>
            </div>

            <div class="producto-card">
                <div class="producto-info"><h3>Chivitos</h3><span>$450</span></div>
                <div class="controles">
                    <button class="btn-control minus" onclick="cambiarCantidad('Chivitos', 450, -1)">-</button>
                    <span class="cantidad-display" id="qty-Chivitos">0</span>
                    <button class="btn-control" onclick="cambiarCantidad('Chivitos', 450, 1)">+</button>
                </div>
            </div>

            <div class="producto-card">
                <div class="producto-info"><h3>Sándwich Caliente</h3><span>$220</span></div>
                <div class="controles">
                    <button class="btn-control minus" onclick="cambiarCantidad('Sandwich-Caliente', 220, -1)">-</button>
                    <span class="cantidad-display" id="qty-Sandwich-Caliente">0</span>
                    <button class="btn-control" onclick="cambiarCantidad('Sandwich-Caliente', 220, 1)">+</button>
                </div>
            </div>
        </details>

        <!-- CATEGORÍA BEBIDAS -->
        <details open>
            <summary class="categoria-titulo">
                <i class="fa-solid fa-bottle-water"></i> BEBIDAS
            </summary>
            
            <div class="producto-card">
                <div class="producto-info"><h3>Refresco 600ml</h3><span>$110</span></div>
                <div class="controles">
                    <button class="btn-control minus" onclick="cambiarCantidad('Refresco-600ml', 110, -1)">-</button>
                    <span class="cantidad-display" id="qty-Refresco-600ml">0</span>
                    <button class="btn-control" onclick="cambiarCantidad('Refresco-600ml', 110, 1)">+</button>
                </div>
            </div>

            <div class="producto-card">
                <div class="producto-info"><h3>Cerveza 1L</h3><span>$220</span></div>
                <div class="controles">
                    <button class="btn-control minus" onclick="cambiarCantidad('Cerveza-1L', 220, -1)">-</button>
                    <span class="cantidad-display" id="qty-Cerveza-1L">0</span>
                    <button class="btn-control" onclick="cambiarCantidad('Cerveza-1L', 220, 1)">+</button>
                </div>
            </div>
        </details>
    </div>

    <!-- PIE DE PÁGINA: CARRITO -->
    <div class="footer-cart">
        <div class="cart-inner">
            <input type="text" id="direccion" class="input-direccion" placeholder="📍 Dirección para el delivery...">
            <div class="cart-data">
                <div>
                    <span class="total-label">Total Pedido</span>
                    <div class="total-monto" id="total-display">$0</div>
                </div>
                <button class="btn-whatsapp" onclick="enviarPedido()">
                    <i class="fa-brands fa-whatsapp"></i> ENVIAR
                </button>
            </div>
        </div>
    </div>

    <script>
        let carrito = {};
        let total = 0;

        function cambiarCantidad(nombre, precio, delta) {
            if (!carrito[nombre]) {
                carrito[nombre] = { precio: precio, cantidad: 0 };
            }
            carrito[nombre].cantidad += delta;
            if (carrito[nombre].cantidad < 0) carrito[nombre].cantidad = 0;

            const display = document.getElementById(`qty-${nombre}`);
            if(display) display.innerText = carrito[nombre].cantidad;
            recalcularTotal();
        }

        function recalcularTotal() {
            total = 0;
            for (const item in carrito) {
                total += carrito[item].precio * carrito[item].cantidad;
            }
            document.getElementById('total-display').innerText = `$${total}`;
        }

        function enviarPedido() {
            const direccion = document.getElementById('direccion').value.trim();
            if (total === 0) { alert("¡Socio! No has elegido nada."); return; }
            if (direccion === "") { alert("Por favor, ingresa tu dirección."); return; }

            const telefono = "59895738828";
            let mensaje = "*PEDIDO - EL VIEJO PANCHO*%0A%0A";
            for (const item in carrito) {
                if (carrito[item].cantidad > 0) {
                    mensaje += `• *${carrito[item].cantidad}x* ${item.replace(/-/g, ' ')}%0A`;
                }
            }
            mensaje += `%0A*TOTAL A PAGAR: $${total}*%0A%0A🏠 *Dirección:* ${direccion}`;
            window.open(`https://wa.me/${telefono}?text=${mensaje}`, '_blank');
        }
    </script>
</body>
</html>
